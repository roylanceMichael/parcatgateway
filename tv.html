<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Parc Condominium Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #1f2937; font-family: 'Inter', sans-serif; }
        .slide-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transition: opacity 1s; opacity: 0; pointer-events: none; padding: 1rem; will-change: opacity; }
        .slide-active { opacity: 1; pointer-events: auto; z-index: 10; }
        @keyframes pulse-border { 0%, 100% { border-color: rgba(16, 185, 129, 1); } 50% { border-color: rgba(16, 185, 129, 0.5); } }
        .urgent-border { animation: pulse-border 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>
</head>
<body class="bg-gray-800 text-gray-100 flex flex-col h-screen overflow-hidden">

    <!-- Header -->
    <header class="bg-gray-900 text-white shadow-lg p-4 z-20 flex-shrink-0">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <img src="https://roylancemichael.github.io/parcatgateway/logo.webp" alt="Parc Logo" class="h-14 md:h-16">
                <div>
                    <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight">Parc at the Gateway</h1>
                    <p class="text-base md:text-lg text-gray-400">Community Notice Board</p>
                </div>
            </div>
            <div class="hidden md:block bg-white p-1 rounded-lg shadow-md">
                 <img src="https://roylancemichael.github.io/parcatgateway/parcfront.webp" alt="The Parc" class="w-24 h-24 object-cover rounded-md">
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto relative w-full h-full">

        <!-- SLIDE 1: MOVIES -->
        <div id="slide-1" class="slide-container">
            <div class="h-full flex flex-col gap-4">
                <!-- Movie Grid -->
                <div id="movie-grid" class="flex-grow grid grid-cols-5 gap-2 content-start overflow-hidden w-full">
                    <!-- Movie Cards Injected via JS -->
                    <div class="col-span-3 text-center text-gray-400 mt-10">Loading Movies...</div>
                </div>

                <!-- Bottom Info Bar -->
                <div class="bg-white rounded-xl p-3 shadow-xl flex flex-row items-center justify-between flex-shrink-0 h-24 border-b-4 border-red-700">
                    <div class="flex items-center gap-4 px-4">
                        <div class="bg-red-700 text-white p-3 rounded-lg shadow">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" /></svg>
                        </div>
                        <div>
                            <h2 class="text-xl md:text-2xl font-extrabold text-gray-800 uppercase tracking-tight">Megaplex Gateway</h2>
                            <p class="text-red-700 text-xs font-bold uppercase tracking-wider">Luxury Heated Recliners</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-6 pr-4">
                        <div class="text-right hidden md:block">
                            <p class="text-gray-900 font-bold leading-tight">Scan for Tickets</p>
                            <p class="text-gray-500 text-xs">Reserve seats online</p>
                        </div>
                        <div class="bg-gray-100 p-1 rounded-lg border border-gray-200">
                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://megaplex.com/gateway" alt="Scan" class="h-16 w-16">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SLIDE 2: EVENTS -->
        <div id="slide-2" class="slide-container">
            <div class="h-full flex flex-col gap-4">
                <div id="events-grid" class="flex-grow grid grid-cols-5 gap-2 content-start overflow-hidden w-full">
                </div>
            </div>
        </div>

        <!-- SLIDE 3: REAL ESTATE -->
        <div id="slide-3" class="slide-container">
            <div class="h-full flex flex-col">
                <div class="flex justify-between items-center mb-4 px-2 border-b-4 border-sky-500 pb-2">
                     <h2 class="text-3xl font-bold text-sky-500">Homes for Sale at The Parc</h2>
                     <div class="text-right"><p class="text-sm text-gray-400">Data via UtahRealEstate.com</p></div>
                </div>
                <div id="forsale-grid" class="flex-grow grid grid-cols-2 lg:grid-cols-3 gap-6 content-start overflow-y-auto pb-4">
                    <!-- Listings Injected via JS -->
                    <div class="col-span-full flex flex-col items-center justify-center h-full text-gray-400">
                        <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        <p class="text-xl">No units currently listed for sale.</p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white text-center p-3 z-20 flex-shrink-0">
        <p class="font-medium text-base"><span id="current-date"></span> &bull; Have a wonderful day! <span id="resolution" class="text-gray-500 text-xs ml-2"></span></p>
        <div class="flex justify-center gap-2 mt-1">
            <div id="dot-1" class="w-2 h-2 rounded-full bg-white transition-all duration-300"></div>
            <div id="dot-2" class="w-2 h-2 rounded-full bg-gray-600 transition-all duration-300"></div>
            <div id="dot-3" class="w-2 h-2 rounded-full bg-gray-600 transition-all duration-300"></div>
        </div>
    </footer>

    <!-- Logic -->
    <script>
        function updateDate() {
            const today = new Date();
            document.getElementById('current-date').textContent = new Intl.DateTimeFormat('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: 'America/Denver' }).format(today);
            document.getElementById('resolution').textContent = `(${window.innerWidth}x${window.innerHeight})`;
        }
        window.addEventListener('resize', updateDate);
        setInterval(updateDate, 60000); updateDate();
        setTimeout(function() { window.location.reload(true); }, 3600000); // 1 hour refresh

        // --- FETCHERS ---
        async function loadData() {
            // Load Events
            try {
                const eRes = await fetch('gateway_events.json');
                if (eRes.ok) {
                    const events = await eRes.json();
                    const eGrid = document.getElementById('events-grid');
                    eGrid.innerHTML = '';
                    events.slice(0, 10).forEach(ev => {
                        eGrid.innerHTML += `
                        <div class="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border-t-4 border-pink-600 flex flex-col h-full transform transition-all">
                            ${ev.image ? `
                                <div class="h-56 w-full relative bg-gray-900 flex-shrink-0">
                                    <img src="${ev.image}" 
                                         loading="lazy" 
                                         class="w-full h-full object-cover object-top">
                                    <div class="absolute inset-0 bg-gradient-to-t from-gray-900 via-transparent to-transparent opacity-90"></div>
                                </div>` : ''}
                            
                            <div class="p-3 flex flex-col flex-grow bg-gray-900/40">
                                <h3 class="text-[14px] font-black text-white mb-1 line-clamp-2 leading-tight uppercase tracking-tight">
                                    ${ev.title}
                                </h3>
                                <p class="text-pink-400 font-bold text-[10px] mb-2 uppercase tracking-widest border-b border-pink-900/30 pb-1">
                                    ${ev.date}
                                </p>
                                <p class="text-gray-300 text-[11px] leading-relaxed line-clamp-4 italic overflow-hidden">
                                    ${ev.description}
                                </p>
                            </div>
                        </div>`;
                    });
                }
            } catch(e) { console.log(e); }

            // Load Movies
            try {
                const mRes = await fetch('movies.json');
                if (mRes.ok) {
                    const movies = await mRes.json();
                    const mGrid = document.getElementById('movie-grid');
                    mGrid.innerHTML = '';
                    movies.slice(0, 10).forEach(m => {
                        const poster = m.poster ? m.poster : `https://placehold.co/400x600/333/fff?text=${encodeURIComponent(m.title)}`;
                        mGrid.innerHTML += `
                        <div class="bg-gray-800 rounded-lg overflow-hidden flex flex-col shadow-lg border border-gray-700 h-full">
                            <div class="h-52 w-full relative flex-shrink-0">
                                <img src="${poster}" loading="lazy" class="w-full h-full object-cover object-top">
                                <div class="absolute top-1 right-1 bg-black/70 text-white text-[9px] px-1 py-0.5 rounded font-bold">${m.rating} (${m.genre}</div>
                            </div>
                            
                            <div class="p-2 flex flex-col justify-between flex-grow bg-gray-900/60">
                                <div class="mb-1">
                                    <h3 class="font-bold text-[12px] text-white leading-tight line-clamp-1 uppercase">${m.title}</h3>
                                </div>
                                
                                <div class="flex flex-wrap mt-auto">
                                    ${m.times.slice(0, 12).map(t => `
                                        <span class="bg-red-900/80 text-red-100 px-1 py-0.5 rounded text-[8px] font-black border border-red-700/30">
                                            ${t}
                                        </span>
                                    `).join('')}
                                </div>
                            </div>
                        </div>`;
                    });
                }
            } catch(e) { 
                document.getElementById('movie-grid').innerHTML = '<div class="col-span-3 text-center text-gray-500">Check Megaplex App for Showtimes</div>';
            }

            // Load Listings
            try {
                const lRes = await fetch('forsale.json');
                if (lRes.ok) {
                    const listings = await lRes.json();
                    if (listings.length > 0) {
                        const lGrid = document.getElementById('forsale-grid');
                        lGrid.innerHTML = '';
                        listings.forEach(item => {
                            // Extract Unit Number for Display
                            const unitNum = item.unit ? `#${item.unit}` : 'Condo';
                            
                            lGrid.innerHTML += `
                            <div class="bg-gray-800 rounded-xl shadow-lg border border-gray-600 flex flex-col h-full overflow-hidden relative">
                                <div class="bg-sky-900 p-4 border-b border-sky-700 flex justify-between items-center">
                                    <h3 class="text-3xl font-extrabold text-white">${unitNum}</h3>
                                    <span class="bg-sky-100 text-sky-800 text-sm font-bold px-2 py-1 rounded uppercase">For Sale</span>
                                </div>
                                <div class="p-5 flex-grow flex flex-col justify-between gap-4">
                                    <div>
                                        <p class="text-3xl font-bold text-green-400 mb-2">${item.price}</p>
                                        <p class="text-gray-300 text-sm border-t border-gray-700 pt-2">${item.details}</p>
                                    </div>
                                    
                                    ${item.link ? `
                                    <div class="flex items-center gap-3 bg-gray-900 p-2 rounded-lg border border-gray-700">
                                        <div class="bg-white p-1 rounded">
                                            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(item.link)}" class="w-16 h-16">
                                        </div>
                                        <div class="flex-grow">
                                            <p class="text-sky-400 font-bold text-sm uppercase leading-tight">Scan for Details</p>
                                            <p class="text-gray-500 text-xs">View photos & tour</p>
                                        </div>
                                    </div>` : ''}
                                </div>
                            </div>`;
                        });
                    }
                }
            } catch(e) { console.log(e); }
        }
        loadData();

        // --- SLIDES ---
        const SLIDE_DURATIONS = { 1: 30000, 2: 30000, 3: 30000 };
        let currentSlide = 1;
        const totalSlides = 3;

        function showSlide(slideNum) {
            for (let i = 1; i <= totalSlides; i++) {
                const slide = document.getElementById(`slide-${i}`);
                const dot = document.getElementById(`dot-${i}`);
                if (i === slideNum) {
                    slide.classList.add('slide-active');
                    dot.classList.replace('bg-gray-600', 'bg-white');
                } else {
                    slide.classList.remove('slide-active');
                    dot.classList.replace('bg-white', 'bg-gray-600');
                }
            }
            currentSlide = slideNum;
        }

        function nextSlide() {
            let next = currentSlide + 1;
            if (next > totalSlides) next = 1;
            showSlide(next);
            setTimeout(nextSlide, SLIDE_DURATIONS[next] || 30000);
        }
        
        // Start loop
        showSlide(1);
        setTimeout(nextSlide, SLIDE_DURATIONS[1]);
    </script>
</body>
</html>
